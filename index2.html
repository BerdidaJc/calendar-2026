<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Yearly Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style2.css">
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="display-3 fw-bold">2026 CALENDAR</h1>
    </header>

    <div id="calendar-grid" class="row g-4">
        </div>
</div>

<script>
    // Configuration: Add your custom holidays here
    const holidays2026 = [
        "2026-01-01",  "2026-02-17", "2026-02-25", 
        "2026-04-02", "2026-04-03", "2026-04-04",
"2026-04-09", "2026-05-01", "2026-06-12", "2026-08-21", 
        "2026-08-31", "2026-11-01", "2026-11-02",
   "2026-11-31",  "2026-12-24", "2026-12-25",
 "2026-12-30", "2026-12-31",
    ];

    const monthNames = ["January", "February", "March", "April", "May", "June",
                        "July", "August", "September", "October", "November", "December"];

    function initCalendar() {
        const grid = document.getElementById('calendar-grid');
        const year = 2026;

        monthNames.forEach((name, monthIndex) => {
            const firstDay = new Date(year, monthIndex, 1).getDay(); // 0 is Sunday
            const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

            let html = `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card month-card h-100">
                        <div class="card-header text-center fw-bold">${name}</div>
                        <div class="card-body p-0">
                            <table class="table table-sm text-center mb-0">
                                <thead>
                                    <tr>
                                        <th>SUN</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th>
                                    </tr>
                                </thead>
                                <tbody><tr>`;

            // Leading empty cells
            for (let i = 0; i < firstDay; i++) html += '<td></td>';

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isHoliday = holidays2026.includes(dateStr);
                const className = isHoliday ? 'holiday-day' : '';

                html += `<td class="${className}">${day}</td>`;

                // Wrap rows on Saturday
                if ((day + firstDay) % 7 === 0 && day !== daysInMonth) {
                    html += '</tr><tr>';
                }
            }

            html += '</tr></tbody></table></div></div></div>';
            grid.innerHTML += html;
        });
    }

    initCalendar();
</script>
</body>
</html>
